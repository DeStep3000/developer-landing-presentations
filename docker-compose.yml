services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-developer_landing}
      POSTGRES_USER: ${DB_USER:-developer_landing}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-developer_landing}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${DB_USER:-developer_landing}:${DB_PASSWORD:-developer_landing}@db:5432/${DB_NAME:-developer_landing}
    command: >
      sh -c "uv run --no-sync python app/manage.py migrate &&
             uv run --no-sync gunicorn config.wsgi:application --chdir app --bind 0.0.0.0:8000"
    ports:
      - "${APP_PORT:-8080}:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
